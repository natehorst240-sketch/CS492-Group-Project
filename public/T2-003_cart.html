<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>T2-003 — Shopping Cart</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 35px auto; padding: 0 20px; background: #f0f0f0; color: #222; }
    h1 { color: #17365d; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { border: 1px solid #bbb; padding: 8px; text-align: left; }
    th { background: #2f75b5; color: white; }
    input { width: 65px; padding: 5px; }
    button { padding: 6px 10px; margin: 2px; cursor: pointer; }
    #message { margin: 10px 0; color: #a00; }
    .summary { margin-top: 15px; text-align: right; font-size: 18px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Shopping Cart</h1>
  <p>T2-003 — Add books from the catalog API, update quantities, or remove items.</p>
  <div>
    <label>Book ID <input id="book-id" type="number" min="1"></label>
    <label>Quantity <input id="add-quantity" type="number" min="1" value="1"></label>
    <button type="button" onclick="addItem()">Add to cart</button>
  </div>
  <div id="message"></div>
  <table>
    <thead><tr><th>Book</th><th>Author</th><th>Price</th><th>Quantity</th><th>Line Total</th><th>Action</th></tr></thead>
    <tbody id="cart-items"></tbody>
  </table>
  <div class="summary" id="cart-total">Total: $0.00</div>

  <script>
    const userId = sessionStorage.getItem('userId');

    async function requestJson(url, options) {
      const response = await fetch(url, options);
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    async function loadCart() {
      if (!userId) {
        document.getElementById('message').textContent = 'Log in first using the T1-004 page.';
        return;
      }
      try {
        const items = await requestJson('/api/cart/' + userId);
        const tbody = document.getElementById('cart-items');
        tbody.innerHTML = '';
        let total = 0;
        items.forEach(function (item) {
          const row = document.createElement('tr');
          const lineTotal = Number(item.price) * Number(item.quantity);
          total += lineTotal;
          row.innerHTML =
            '<td></td><td></td><td></td><td></td><td></td><td></td>';
          row.children[0].textContent = item.title;
          row.children[1].textContent = item.author;
          row.children[2].textContent = '$' + Number(item.price).toFixed(2);
          const quantity = document.createElement('input');
          quantity.type = 'number';
          quantity.min = '1';
          quantity.value = item.quantity;
          quantity.onchange = function () { updateItem(item.id, quantity.value); };
          row.children[3].appendChild(quantity);
          row.children[4].textContent = '$' + lineTotal.toFixed(2);
          const remove = document.createElement('button');
          remove.textContent = 'Remove';
          remove.onclick = function () { removeItem(item.id); };
          row.children[5].appendChild(remove);
          tbody.appendChild(row);
        });
        document.getElementById('cart-total').textContent = 'Total: $' + total.toFixed(2);
        document.getElementById('message').textContent = '';
      } catch (error) {
        document.getElementById('message').textContent = error.message;
      }
    }

    async function addItem() {
      try {
        await requestJson('/api/cart', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: userId,
            book_id: Number(document.getElementById('book-id').value),
            quantity: Number(document.getElementById('add-quantity').value)
          })
        });
        loadCart();
      } catch (error) {
        document.getElementById('message').textContent = error.message;
      }
    }

    async function updateItem(id, quantity) {
      await requestJson('/api/cart/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ quantity: Number(quantity) })
      });
      loadCart();
    }

    async function removeItem(id) {
      await requestJson('/api/cart/' + id, { method: 'DELETE' });
      loadCart();
    }

    loadCart();
  </script>
</body>
</html>
