<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>T1-004 — AceReads Login</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 20px; background: #f0f0f0; color: #222; }
    h1 { color: #17365d; }
    .forms { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; }
    form { background: white; padding: 18px; border: 1px solid #bbb; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input { box-sizing: border-box; width: 100%; padding: 8px; margin-top: 4px; }
    button { margin-top: 14px; padding: 9px 16px; background: #2f75b5; color: white; border: 0; cursor: pointer; }
    #message { margin: 15px 0; padding: 10px; display: none; }
    .success { display: block !important; background: #e2f0d9; }
    .error { display: block !important; background: #f4cccc; }
  </style>
</head>
<body>
  <h1>AceReads Account</h1>
  <p>T1-004 — Registration and Login Interface</p>
  <div id="message"></div>

  <div class="forms">
    <form id="register-form">
      <h2>Register</h2>
      <label>Email <input name="email" type="email" required></label>
      <label>Password <input name="password" type="password" required></label>
      <label>First name <input name="first_name"></label>
      <label>Last name <input name="last_name"></label>
      <button type="submit">Create account</button>
    </form>

    <form id="login-form">
      <h2>Log In</h2>
      <label>Email <input name="email" type="email" required></label>
      <label>Password <input name="password" type="password" required></label>
      <button type="submit">Log in</button>
    </form>
  </div>

  <script>
    async function send(url, body) {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    function formValues(form) {
      return Object.fromEntries(new FormData(form).entries());
    }

    function showMessage(text, type) {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = type;
    }

    document.getElementById('register-form').addEventListener('submit', async function (event) {
      event.preventDefault();
      try {
        const result = await send('/api/auth/register', formValues(event.currentTarget));
        showMessage(result.message, 'success');
        event.currentTarget.reset();
      } catch (error) {
        showMessage(error.message, 'error');
      }
    });

    document.getElementById('login-form').addEventListener('submit', async function (event) {
      event.preventDefault();
      try {
        const result = await send('/api/auth/login', formValues(event.currentTarget));
        sessionStorage.setItem('authToken', result.token);
        sessionStorage.setItem('userId', String(result.user.id));
        sessionStorage.setItem('currentUser', JSON.stringify(result.user));
        showMessage('Login successful. You may now use the catalog, cart, and orders pages.', 'success');
      } catch (error) {
        showMessage(error.message, 'error');
      }
    });
  </script>
</body>
</html>
