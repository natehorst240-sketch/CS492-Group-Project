<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>T2-009 — My Orders</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f0f0; margin: 20px; color: #222; }
    h1 { color: #17365d; }
    .order-card { background: white; border: 1px solid #999; padding: 14px; margin-bottom: 12px; }
    .order-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .status { padding: 3px 9px; border-radius: 4px; background: #d9eaf7; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { border: 1px solid #ddd; padding: 7px; text-align: left; }
    th { background: #eee; }
    .total { text-align: right; font-weight: bold; margin-top: 8px; }
    .empty { text-align: center; padding: 36px; color: #666; }
    #message { color: #a00; margin-bottom: 10px; }
  </style>
</head>
<body>
  <h1>My Orders</h1>
  <p>T2-009 — Customer Order Tracking</p>
  <div id="message"></div>
  <div id="orders-list"></div>

  <script>
    const userId = sessionStorage.getItem('userId');

    if (!userId) {
      document.getElementById('orders-list').innerHTML =
        '<p class="empty">Please log in to view your orders. For the demo, set userId to 1 as described on the home page.</p>';
    } else {
      loadOrders();
    }

    async function requestJson(url) {
      const response = await fetch(url);
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    async function loadOrders() {
      try {
        const orders = await requestJson('/api/orders?user_id=' + encodeURIComponent(userId));
        const container = document.getElementById('orders-list');
        if (!orders.length) {
          container.innerHTML = '<p class="empty">No orders found.</p>';
          return;
        }
        container.innerHTML = '';
        for (const orderSummary of orders) {
          const order = await requestJson('/api/orders/' + orderSummary.id);
          container.appendChild(buildOrderCard(order));
        }
      } catch (error) {
        document.getElementById('message').textContent = error.message;
      }
    }

    function buildOrderCard(order) {
      const card = document.createElement('article');
      card.className = 'order-card';

      const header = document.createElement('div');
      header.className = 'order-header';
      const info = document.createElement('strong');
      info.textContent = 'Order #' + order.id + ' — ' + new Date(order.created_at).toLocaleDateString();
      const status = document.createElement('span');
      status.className = 'status';
      status.textContent = order.status;
      header.append(info, status);
      card.appendChild(header);

      const table = document.createElement('table');
      table.innerHTML = '<thead><tr><th>Title</th><th>Author</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>';
      const body = document.createElement('tbody');
      (order.items || []).forEach(function (item) {
        const row = document.createElement('tr');
        [item.title, item.author, item.quantity, '$' + Number(item.price_at_purchase).toFixed(2),
          '$' + (Number(item.quantity) * Number(item.price_at_purchase)).toFixed(2)]
          .forEach(function (value) {
            const cell = document.createElement('td');
            cell.textContent = value;
            row.appendChild(cell);
          });
        body.appendChild(row);
      });
      table.appendChild(body);
      card.appendChild(table);

      const total = document.createElement('div');
      total.className = 'total';
      total.textContent = 'Total: $' + Number(order.total_amount).toFixed(2);
      card.appendChild(total);
      return card;
    }
  </script>
</body>
</html>
